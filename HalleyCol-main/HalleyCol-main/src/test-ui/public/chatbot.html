<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vekas WhatsApp IA Tester</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/chatbot.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <main class="chat-container">
            <header class="chat-header">
                <div class="contact-info">
                    <div class="avatar">
                        <img src="/img/logo.png" alt="Vekas"
                            onerror="this.src='https://ui-avatars.com/api/?name=VK&background=00a884&color=fff&rounded=true'">
                    </div>
                    <div class="brand">
                        <h1>Vekas</h1>
                        <p class="status" id="statusText">en línea</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="btn-icon" id="clearBtn" title="Reiniciar"><i class="fa-solid fa-rotate-right"></i></button>
                </div>
            </header>

            <div id="messagesContainer" class="chat-box"></div>

            <!-- Preview de imagen seleccionada (oculto por defecto) -->
            <div id="imagePreviewBar" class="image-preview-bar" style="display:none">
                <div class="image-preview-thumb-wrap">
                    <img id="imagePreviewThumb" class="image-preview-thumb" src="" alt="Preview">
                    <button id="removeImageBtn" class="remove-image-btn" title="Quitar imagen">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <span id="imagePreviewName" class="image-preview-name"></span>
            </div>

            <div class="chat-input-area">
                <button class="btn-icon" title="Emoji"><i class="fa-regular fa-face-smile"></i></button>

                <!-- Clip funcional -->
                <button class="btn-icon" id="attachBtn" title="Adjuntar imagen">
                    <i class="fa-solid fa-paperclip"></i>
                </button>
                <input type="file" id="fileInput" accept="image/*" style="display:none">

                <form id="chatForm">
                    <input type="text" id="userInput" placeholder="Escribe un mensaje" autocomplete="off">
                    <button type="submit" id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
                </form>
                <button class="btn-icon mic-btn"><i class="fa-solid fa-microphone"></i></button>
            </div>
        </main>

        <aside class="debug-panel">
            <div class="panel-header">
                <h2><i class="fa-solid fa-microchip"></i> IA Debugger</h2>
                <span class="status-badge pulse" id="debugStatus">Conectado</span>
            </div>
            <div class="debug-card">
                <h3>Intención</h3>
                <div id="debug-intent" class="debug-value">Ninguna</div>
                <h3>Confianza</h3>
                <div class="progress-bar">
                    <div id="debug-confidence" class="progress-fill" style="width: 0%;"></div>
                </div>
                <div id="debug-confidence-text" class="text-right text-small">0%</div>
                <h3>Estado FSM</h3>
                <div id="debug-fsm" class="debug-value">IDLE</div>
                <h3>Entidades</h3>
                <pre id="debug-entities" class="json-viewer">{}</pre>
                <h3>Historial</h3>
                <pre id="debug-history" class="json-viewer">[]</pre>
            </div>
        </aside>
    </div>

    <script>
        const API_BASE = '/api';
        const SESSION_ID = 'chatbot_' + Date.now();

        const chatForm       = document.getElementById('chatForm');
        const userInput      = document.getElementById('userInput');
        const sendBtn        = document.getElementById('sendBtn');
        const attachBtn      = document.getElementById('attachBtn');
        const fileInput      = document.getElementById('fileInput');
        const removeImageBtn = document.getElementById('removeImageBtn');
        const imagePreviewBar  = document.getElementById('imagePreviewBar');
        const imagePreviewThumb = document.getElementById('imagePreviewThumb');
        const imagePreviewName  = document.getElementById('imagePreviewName');
        const messagesContainer = document.getElementById('messagesContainer');
        const clearBtn       = document.getElementById('clearBtn');
        const statusText     = document.getElementById('statusText');

        const debugIntent     = document.getElementById('debug-intent');
        const debugConfidence = document.getElementById('debug-confidence');
        const debugEntities   = document.getElementById('debug-entities');
        const debugHistory    = document.getElementById('debug-history');
        const debugFsm        = document.getElementById('debug-fsm');

        // Imagen pendiente (seleccionada pero no enviada aún)
        let pendingFile = null;
        let lastMessageId = 0;

        // ── Markdown ligero ─────────────────────────────────────
        function renderMarkdown(text) {
            if (!text) return '';
            return text
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/__(.+?)__/g, '<strong>$1</strong>')
                .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>')
                .replace(/\n/g, '<br>');
        }

        // ── Añadir mensaje de texto ──────────────────────────────
        function addMessage(text, sender, buttons = []) {
            const time = new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender === 'user' ? 'user' : 'system'}`;

            const htmlText = sender === 'user' ? escapeHtml(text) : renderMarkdown(text);

            let buttonsHtml = '';
            if (buttons && buttons.length > 0) {
                buttonsHtml = `<div class="buttons-container">${buttons.map(btn =>
                    `<button class="action-btn" onclick="sendMessage('${escapeAttr(btn)}')">${escapeHtml(btn)}</button>`
                ).join('')}</div>`;
            }

            messageDiv.innerHTML = `
                <div class="bubble">
                    <span class="message-text">${htmlText}</span>
                    <span class="timestamp">${time}</span>
                    ${buttonsHtml}
                </div>`;

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            return messageDiv;
        }

        // ── Añadir burbuja de imagen (con caption opcional) ──────
        function addImageMessage(imageUrl, caption, sender = 'user') {
            const time = new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender === 'user' ? 'user' : 'system'}`;
            const captionHtml = caption
                ? `<div class="image-msg-caption">${escapeHtml(caption)}</div>`
                : '';
            messageDiv.innerHTML = `
                <div class="bubble bubble-image">
                    <div class="image-caption-label">📎 Comprobante de pago</div>
                    <img src="${imageUrl}" class="chat-image" alt="Comprobante"
                         onclick="window.open('${imageUrl}', '_blank')"
                         title="Click para ver en tamaño completo">
                    ${captionHtml}
                    <span class="timestamp">${time}</span>
                </div>`;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // ── Typing indicator ─────────────────────────────────────
        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message system';
            div.id = 'typing-indicator';
            div.innerHTML = `<div class="bubble typing-bubble">
                <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
            </div>`;
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        function hideTyping() {
            document.getElementById('typing-indicator')?.remove();
        }

        // ── Escapes ──────────────────────────────────────────────
        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        function escapeAttr(str) {
            return String(str).replace(/'/g, "\\'");
        }

        // ── Actualizar panel debug ───────────────────────────────
        function updateDebug(data) {
            if (debugIntent) debugIntent.textContent = data.intent || 'Ninguna';
            if (debugConfidence) {
                const c = (data.confidence || 0) * 100;
                debugConfidence.style.width = c + '%';
                debugConfidence.style.backgroundColor = c >= 75 ? '#00a884' : c >= 50 ? '#f59e0b' : '#ef4444';
                document.getElementById('debug-confidence-text').textContent = Math.round(c) + '%';
            }
            if (debugFsm) debugFsm.textContent = data.context?.fsmState || 'IDLE';
            if (debugEntities) debugEntities.textContent = JSON.stringify(data.entities || {}, null, 2);
            if (debugHistory) {
                const history = (data.context?.history || []).slice(0, 5).map(h => ({
                    intent: h.intent, confidence: h.confidence, rawText: h.rawText?.substring(0, 40)
                }));
                debugHistory.textContent = JSON.stringify(history, null, 2);
            }
        }

        // ── Selección de imagen (preview sin enviar aún) ─────────
        function selectImage(file) {
            pendingFile = file;
            const localUrl = URL.createObjectURL(file);
            imagePreviewThumb.src = localUrl;
            imagePreviewName.textContent = file.name;
            imagePreviewBar.style.display = 'flex';
            userInput.placeholder = 'Añade un texto (opcional)…';
            userInput.focus();
        }

        function clearPendingImage() {
            pendingFile = null;
            fileInput.value = '';
            imagePreviewThumb.src = '';
            imagePreviewBar.style.display = 'none';
            userInput.placeholder = 'Escribe un mensaje';
        }

        // ── Enviar texto + imagen juntos ─────────────────────────
        async function handleSend() {
            const text = userInput.value.trim();
            const file = pendingFile;

            if (!text && !file) return;

            // Bloquear UI
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;
            attachBtn.disabled = true;
            statusText.textContent = file ? 'enviando…' : 'escribiendo…';

            // 1. Si hay imagen: subir primero y mostrar burbuja
            let uploadedUrl = null;
            if (file) {
                const localUrl = URL.createObjectURL(file);
                addImageMessage(localUrl, text || null, 'user');
                clearPendingImage();
                showTyping();

                try {
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('sessionId', SESSION_ID);

                    const uploadRes = await fetch('/api/upload', { method: 'POST', body: formData });

                    // Parsear JSON de forma segura (el servidor podría devolver HTML si no fue reiniciado)
                    let uploadData;
                    try {
                        uploadData = await uploadRes.json();
                    } catch {
                        hideTyping();
                        addMessage('❌ El servidor no reconoce el endpoint de subida. Por favor reinicia el servidor (`npm run start:ui`).', 'bot');
                        unlock();
                        return;
                    }

                    if (uploadRes.ok && uploadData.success) {
                        uploadedUrl = uploadData.url;
                    } else {
                        hideTyping();
                        addMessage('❌ No se pudo subir la imagen: ' + (uploadData?.error || `Error ${uploadRes.status}`), 'bot');
                    }
                } catch (e) {
                    hideTyping();
                    addMessage('❌ Error de red al subir la imagen. Verifica que el servidor esté corriendo.', 'bot');
                    console.error('[Upload]', e);
                    unlock();
                    return;
                }

                // Notificar al bot con el mensaje especial de comprobante
                hideTyping();
                showTyping();
                try {
                    const chatMsg = text || '[COMPROBANTE_PAGO]';
                    const chatRes = await fetch(`${API_BASE}/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: chatMsg, sessionId: SESSION_ID, imageUrl: uploadedUrl }),
                    });
                    hideTyping();
                    const chatData = await chatRes.json();
                    if (chatRes.ok) {
                        if (chatData.messageId) lastMessageId = Math.max(lastMessageId, chatData.messageId);
                        addMessage(chatData.reply || '✅ Comprobante recibido. Lo revisaremos pronto.', 'bot', chatData.buttons || []);
                        if (chatData.debug) updateDebug(chatData.debug);
                    } else {
                        addMessage('✅ Imagen recibida. Nuestro equipo validará tu comprobante pronto.', 'bot');
                    }
                } catch (e) {
                    hideTyping();
                    // La imagen ya se subió exitosamente, no mostrar error al usuario
                    addMessage('✅ Imagen recibida. Nuestro equipo validará tu comprobante pronto.', 'bot');
                    console.error('[Chat post-upload]', e);
                }

            } else {
                // 2. Solo texto (sin imagen)
                addMessage(text, 'user');
                showTyping();
                try {
                    const res = await fetch(`${API_BASE}/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: text, sessionId: SESSION_ID }),
                    });
                    hideTyping();
                    const data = await res.json();
                    if (res.ok) {
                        if (data.messageId) lastMessageId = Math.max(lastMessageId, data.messageId);
                        addMessage(data.reply, 'bot', data.buttons || []);
                        if (data.debug) updateDebug(data.debug);
                    } else {
                        addMessage('❌ Error: ' + (data.error || 'Error interno'), 'bot');
                    }
                } catch (e) {
                    hideTyping();
                    addMessage('❌ Error de conexión. ¿Está corriendo el servidor?', 'bot');
                    console.error('[Chat]', e);
                }
            }

            unlock();
        }

        function unlock() {
            userInput.disabled = false;
            sendBtn.disabled = false;
            attachBtn.disabled = false;
            statusText.textContent = 'en línea';
            userInput.focus();
        }

        // ── Event listeners ──────────────────────────────────────
        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            handleSend();
        });

        attachBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) selectImage(file);
        });

        removeImageBtn.addEventListener('click', () => clearPendingImage());

        clearBtn.addEventListener('click', () => {
            messagesContainer.innerHTML = '';
            location.reload();
        });

        // Pegar imagen desde clipboard (Ctrl+V)
        document.addEventListener('paste', (e) => {
            const items = e.clipboardData?.items;
            if (!items) return;
            for (const item of items) {
                if (item.type.startsWith('image/')) {
                    const file = item.getAsFile();
                    if (file) selectImage(file);
                    break;
                }
            }
        });

        // ── Polling de mensajes (Notificaciones Push Simuladas) ──
        async function pollMessages() {
            try {
                const res = await fetch(`/api/chat/messages?sessionId=${SESSION_ID}&lastId=${lastMessageId}`);
                if (!res.ok) return;
                const data = await res.json();
                if (data.success && data.messages && data.messages.length > 0) {
                    for (const msg of data.messages) {
                        if (msg.id > lastMessageId) {
                            lastMessageId = msg.id;
                            addMessage(msg.contenido, 'bot');
                        }
                    }
                }
            } catch (e) {
                // Silencioso para no llenar la consola en caso de fallo de red
            }
        }
        
        // Consultar nuevos mensajes cada 3 segundos
        setInterval(pollMessages, 3000);

        // ── Mensaje de bienvenida ────────────────────────────────
        window.addEventListener('load', () => {
            setTimeout(() => {
                addMessage(
                    '¡Hola! Soy el asistente virtual de **Vekas** 👋\n\n¿En qué te puedo ayudar hoy?',
                    'bot',
                    ['Ver catálogo 👠', 'Consultar tallas', 'Métodos de pago', 'Estado de mi pedido']
                );
            }, 500);
        });
    </script>
</body>
</html>
